services:
  - type: web
    name: nla-growth-admin
    env: node
    plan: free
    rootDir: web
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_NAME
        value: 管理员
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # 推荐改成单个 JSON 环境变量，例如：
      # ADMIN_ACCOUNTS=[{"username":"admin1","password":"pass1","name":"管理员A"},{"username":"admin2","password":"pass2","name":"管理员B"}]



